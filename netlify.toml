[build]
command = "pnpm build"
publish = "build/client"

[build.environment]
NODE_VERSION = "22"
NPM_FLAGS = "--no-optional"

[dev]
command = "pnpm dev"

# Legacy URL redirects (old platform -> new site). 301 permanent.
# User-defined rules are processed before the framework's SSR catch-all,
# so these match first. force = true ensures the redirect always wins.
[[redirects]]
  from = "/ministry-breakout-presentations-and-resources"
  to = "/link-tree/ministry-breakout-presentations-and-resources"
  status = 301
  force = true

[[redirects]]
  from = "/events/terremoto-venezuela"
  to = "/terremoto-venezuela"
  status = 301
  force = true

[[redirects]]
  from = "/articles/give-to-the-crisis-fund"
  to = "/give-to-the-crisis-fund"
  status = 301
  force = true

# Security headers applied to all routes
[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(self)"

# rock-proxy is a server-side proxy intentionally served inside an iframe;
# its loader sets X-Frame-Options: ALLOWALL and CSP frame-ancestors: * in the
# response, but netlify.toml headers take precedence, so we override here.
[[headers]]
  for = "/rock-proxy"
  [headers.values]
    X-Frame-Options = "ALLOWALL"

# Long-lived caching for hashed Vite assets and static marketing images
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/images/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"